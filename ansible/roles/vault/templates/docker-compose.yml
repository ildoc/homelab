---
services:
  vault:
    image: hashicorp/vault:2.0.2@sha256:3fd53308acccd9e4e83fde3e6c6cf5b15e0f7fac1ff7510780b8b23f5e4c3de7
    container_name: vault
    user: "0:0"
    ports:
      - "8200:8200"
    volumes:
      - ./config:/vault/config
      - ./data:/vault/file
      - ./init-vault.sh:/init-vault.sh
    cap_add:
      - IPC_LOCK
      - SETFCAP
    command: "vault server -config=/vault/config/vault-config.json"
    restart: unless-stopped
