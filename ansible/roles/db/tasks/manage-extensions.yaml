---
- name: Install PostgreSQL extensions
  community.postgresql.postgresql_ext:
    name: "{{ item.1.name | default(item.1) }}"
    db: "{{ item.0.name }}"
    state: present
    version: "{{ item.1.version | default(omit) }}"
    login_host: localhost
    login_user: "{{ db.postgres.admin_user }}"
    login_password: "{{ db.postgres.admin_password }}"
    login_db: postgres
    port: 5432
  loop: "{{ db.postgres.databases | default([]) | subelements('extensions', skip_missing=True) }}"
  loop_control:
    label: "{{ item.1.name | default(item.1) }} in {{ item.0.name }}"
  register: ext_installation

- name: Display extension installation results
  ansible.builtin.debug:
    msg: "Extension {{ item.item.1.name | default(item.item.1) }} in {{ item.item.0.name }}: {{ 'Installed/Updated' if item.changed else 'Already present' }}"
  loop: "{{ ext_installation.results }}"
  loop_control:
    label: "{{ item.item.1.name | default(item.item.1) }}"
  when: ext_installation.results is defined
