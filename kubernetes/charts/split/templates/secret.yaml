---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: split-db-secret
  namespace: apps
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-cross-secret-store
    kind: ClusterSecretStore
  target:
    name: split-db-secret
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: cross/data/apps/split
        property: postgres_password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: split-secret
  namespace: apps
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-kubernetes-secret-store
    kind: ClusterSecretStore
  target:
    name: split-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt-key
      remoteRef:
        key: kubernetes/data/apps/split
        property: jwt_key
    - secretKey: resend-api-key
      remoteRef:
        key: kubernetes/data/apps/split
        property: resend_api_key
    - secretKey: admin-email
      remoteRef:
        key: kubernetes/data/apps/split
        property: admin_email
    - secretKey: admin-password
      remoteRef:
        key: kubernetes/data/apps/split
        property: admin_password

