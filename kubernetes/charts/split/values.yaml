split-backend:

  image:
    tag: "0.0.0-alpha007:sha256:7e5a6f53212f3ccf0a9ad012c0084af3b7bc4b74e3a4d2c009a9d63cfb918919"

  # ── Gateway API ──────────────────────────────────────────────────────────────
  httpRoute:
    enabled: false
    gatewayName: prod-gateway
    gatewayNamespace: gateway-system
    hostname: split.ildoc.it
    singleDomain: true

  # ── WebApp ────────────────────────────────────────────────────────────────────
  webapp:
    enabled: true

  # ── Configurazione applicativa ────────────────────────────────────────────────
  config:
    appBaseUrl: "https://split.ildoc.it"
    db:
      host: "192.168.0.30"
      name: "split_db"
      user: "split_user"
    jwtIssuer: "https://split.ildoc.it"
    jwtAudience: "split-app"
    resendFromEmail: "Split <noreply@split.ildoc.it>"
    corsWebAppOrigins: []
  # ── Secrets (gestiti dall'ExternalSecret nel wrapper chart) ─────────────────
  secrets:
    dbPassword:
      secretName: split-db-secret
      secretKey: db-password
    jwtKey:
      secretName: split-secret
      secretKey: jwt-key
    resendApiKey:
      secretName: split-secret
      secretKey: resend-api-key
    adminCredentials:
      secretName: split-secret
      emailKey: admin-email
      passwordKey: admin-password
